const T={};
const reg=(k)=>(el)=>{ if(el) T[k]=el; else delete T[k]; };
const SX=1080, SY=560;
function edgePath(a,b){
  const x1=a.x/100*SX,y1=a.y/100*SY,x2=b.x/100*SX,y2=b.y/100*SY;
  const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1;
  const off=Math.min(46,len*0.14);
  const cx=mx+(-dy/len)*off, cy=my+(dx/len)*off;
  return `M ${x1.toFixed(1)} ${y1.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${x2.toFixed(1)} ${y2.toFixed(1)}`;
}
function MeshNode({n,st,focus,onOpen}){

  let border=C.borderStrong,ic=C.grey,bg=C.surface,dot=C.muted,anim="",badge=null;
  if(st==="active"){border=C.teal;ic=C.teal600;dot=C.teal;anim="nodePulse 1.8s infinite";}

  else if(st==="wait"){border=C.orange;ic=C.orangeText;dot=C.orange;anim="waitPulse 1.4s infinite";}
  const W=human?150:112;

    <div ref={reg(n.id)} onClick={onOpen} title={n.label}

      <div style={{background:human?"#fff":bg,border:`${human?2:1.5}px ${io?"dashed":"solid"} ${human?C.orange:border}`,borderRadius:human?14:11,padding:human?"10px 11px":"8px 9px",boxShadow:focus?C.shadowMd:C.shadowSm,animation:anim,position:"relative"}}>
        {ring!=="none"&&<div style={{position:"absolute",inset:-3,borderRadius:human?16:13,boxShadow:ring,pointerEvents:"none"}}/>}

            {human?<Ic.UserCog size={16} color="#fff"/>:<NIcon size={15} color={ic}/>}

            <div style={{fontSize:human?13:11.5,fontWeight:human?800:700,color:C.ink,lineHeight:1.15,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{n.label}</div>
          </div>
          {badge&&<span style={{width:15,height:15,borderRadius:"50%",background:badgeBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{badge}</span>}
          {!badge&&<span style={{width:8,height:8,borderRadius:"50%",background:dot,flexShrink:0}}/>}
        </div>
        {human&&<div style={{fontSize:9.5,color:C.orangeText,fontWeight:700,marginTop:4}}>{st==="wait"?"2 decisions pending":st==="done"?"signed off":"human in the loop"}</div>}
      </div>
    </div>
  );
}
function MeshCanvas({nodeStatus,edgeStatus,focus,onOpen}){
  return (
    <div style={{position:"relative",width:"100%",aspectRatio:"1080 / 560",background:"radial-gradient(circle at 28% 18%, #ffffff, #F1EFEC 78%)",border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden",boxShadow:C.shadowSm}}>
      <svg viewBox="0 0 1080 560" preserveAspectRatio="none" style={{position:"absolute",inset:0,width:"100%",height:"100%"}}>
        {EDGES.map(([id,f,t])=>{const st=edgeStatus[id];const a=NMAP[f],b=NMAP[t];

}
function Pointer({x,y,click}){return (
  <div style={{position:"fixed",left:0,top:0,zIndex:10000,pointerEvents:"none",transform:`translate(${x}px,${y}px)`,transition:"transform .7s cubic-bezier(.4,.7,.3,1)"}}>

    <svg width="26" height="26" viewBox="0 0 26 26" style={{filter:"drop-shadow(0 2px 3px rgba(0,0,0,.35))"}}><path d="M5 3l14 6.5-6 1.6-1.6 6z" fill="#fff" stroke="#1f2d3a" strokeWidth="1.4" strokeLinejoin="round"/></svg>
  </div>
);}

function sayText(say){ if(!say) return ""; const arr=Array.isArray(say)?say:[say]; return arr.map(p=>(p&&typeof p==="object")?(p.pt||""):String(p)).join(""); }
const AUDIO_SRC="mesh.mp3";

function Room({initialTour,onHome}){
  const [touring,setTouring]=useState(initialTour);
  const [runKey,setRunKey]=useState(0);
  const [beat,setBeat]=useState(0);
  const [openPanel,setOpenPanel]=useState(null);
  const [doc,setDoc]=useState(null);
  const [chosen,setChosen]=useState(null);
  const [voiceOn,setVoiceOn]=useState(true);
  const [ptr,setPtr]=useState({x:-9999,y:-9999,click:false});
  const voiceRef=useRef(true);useEffect(()=>{voiceRef.current=voiceOn;},[voiceOn]);
  const audioRef=useRef(null); const beatRef=useRef(0);
  const move=useMemo(()=>(x,y,click)=>{ setPtr({x,y,click:false}); if(click){ setTimeout(()=>setPtr(p=>({...p,click:true})),700); setTimeout(()=>setPtr(p=>({...p,click:false})),1100);} },[]);
  const synth=(typeof window!=="undefined")?window.speechSynthesis:null;
  const speakThen=useMemo(()=>(say,onEnd)=>{
    if(!synth){return false;} try{synth.cancel();}catch(e){}
    if(!voiceRef.current||!say){return false;}
    const text=sayText(say); if(!text) return false;
    const vs=synth.getVoices()||[]; const v=vs.find(x=>/en[-_]GB/i.test(x.lang))||vs.find(x=>/^en/i.test(x.lang))||vs[0]||null;
    const u=new SpeechSynthesisUtterance(text); if(v)u.voice=v; u.lang=(v&&v.lang)||"en-GB"; u.rate=.98;
    u.onend=()=>onEnd&&onEnd(); u.onerror=()=>onEnd&&onEnd();
    try{synth.speak(u);return true;}catch(e){return false;}
  },[synth]);

  const applyBeat=useMemo(()=>(i)=>{
    beatRef.current=i; setBeat(i);
    setChosen(RESOLVE_IDX>=0&&i>=RESOLVE_IDX?STAGES[RESOLVE_IDX].resolve:null);
    const s=STAGES[i]||{};
    setOpenPanel(s.open?(s.open==="decide"?"act":s.open):null);
  },[]);

  useEffect(()=>{
    const a=audioRef.current;
    if(!touring){ if(synth){try{synth.cancel();}catch(e){}} if(a){try{a.pause();}catch(e){}} return; }
    let cancelled=false,timer=null;
    const arm=(ms,fn)=>{ if(timer)clearTimeout(timer); timer=setTimeout(fn,ms); };
    applyBeat(0);
    const durs=STAGES.map(s=>sayText(s.say).length+12); const total=durs.reduce((x,y)=>x+y,0);
    const cum=[]; { let t=0; for(let k=0;k<durs.length;k++){ cum.push(t); t+=durs[k]; } }
    const startTimers=()=>{ let i=0;
      const run=()=>{ const s=STAGES[i]; if(!s) return; applyBeat(i); let settled=false;
        const finish=()=>{ if(settled||cancelled) return; settled=true; if(timer){clearTimeout(timer);timer=null;} i+=1; if(!cancelled&&i<STAGES.length) run(); else setTouring(false); };
        const hold=(s.dur||5)*1000;
        const spoke=speakThen(s.say||"",()=>{ if(!settled&&!cancelled) arm(500,finish); });
        if(spoke){ arm(Math.max(hold,4500)+9000,finish);} else { arm(hold,finish);} };
      run(); };
    if(a){
      try{a.pause();}catch(e){} a.src=AUDIO_SRC; try{a.currentTime=0;}catch(e){} a.muted=!voiceRef.current;
      const onTime=()=>{ if(cancelled) return; const dur=a.duration; const sc=(dur&&isFinite(dur)&&total>0)?dur/total:1; const ct=a.currentTime; let idx=0; for(let k=0;k<cum.length;k++){ if(ct>=cum[k]*sc) idx=k; else break; } if(idx!==beatRef.current) applyBeat(idx); };
      const onEnd=()=>{ if(!cancelled) setTouring(false); };
      a.addEventListener("timeupdate",onTime); a.addEventListener("ended",onEnd);
      const p=a.play(); if(p&&p.catch) p.catch(()=>{ if(!cancelled) startTimers(); });
      return ()=>{ cancelled=true; if(timer)clearTimeout(timer); a.removeEventListener("timeupdate",onTime); a.removeEventListener("ended",onEnd); try{a.pause();}catch(e){} };
    }
    startTimers();
    return ()=>{ cancelled=true; if(timer)clearTimeout(timer); if(synth){try{synth.cancel();}catch(e){}} };
  },[touring,runKey]);

  useEffect(()=>{ if(synth&&!voiceOn){try{synth.cancel();}catch(e){}} const a=audioRef.current; if(a) a.muted=!voiceOn; },[voiceOn,synth]);

  // pointer follows focus / point target during tour
  useEffect(()=>{
    if(!touring){ setPtr({x:-9999,y:-9999,click:false}); return; }
    const s=STAGES[beat]||{}; const keyT=s.point||s.focus; if(!keyT){ setPtr({x:-9999,y:-9999,click:false}); return; }
    let to=setTimeout(()=>{ const el=T[keyT]; if(el){ const r=el.getBoundingClientRect(); move(r.left+r.width/2, r.top+r.height/2, !!s.point); } },s.open?700:250);
    return ()=>clearTimeout(to);
  },[touring,beat,move,openPanel]);

  const {ns,es}=foldState(beat);
  const capt=touring?sayText((STAGES[beat]||{}).say):"";
  const startTour=()=>{ setChosen(null); setOpenPanel(null); setRunKey(k=>k+1); setTouring(true); };

    <div style={{minHeight:"100vh",background:C.bg}}>

          <div onClick={onHome} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><AppMark size={30}/><span style={{fontWeight:800,fontSize:16,color:C.ink}}>Pricing-Model Mesh</span></div>
          <Chip tone="teal">AGEAS motor · MAI-2026</Chip>
          <div style={{flex:1}}/>
          {!touring&&<Btn kind="secondary" onClick={startTour}><Ic.Play size={15}/> {beat>0?"Replay tour":"Watch tour"}</Btn>}
          <span style={{display:"inline-flex",alignItems:"center",gap:8,height:34,padding:"0 12px",borderRadius:999,border:`1px solid ${C.border}`,background:C.surface,color:C.label,fontSize:13,fontWeight:600}}><Ic.UserRound size={15} color={C.teal600}/> S. Marques · Actuarial</span>
        </div>
      </header>
      <main style={{maxWidth:1200,margin:"0 auto",padding:"22px 22px 120px"}}>
        <div style={{marginBottom:14}}>
          <h1 style={{fontSize:22,fontWeight:800,marginBottom:4}}>Agentic pricing-model set-up</h1>
          <p style={{margin:0,fontSize:14,color:C.label,maxWidth:820,lineHeight:1.5}}>Every agent runs continuously and streams its work along the wires. Validation and the optimiser route their flags to the actuary — the human node — who governs the release. Click any agent to open its real working.</p>
        </div>
        <MeshCanvas nodeStatus={ns} edgeStatus={es} focus={touring?(STAGES[beat]||{}).focus:null} onOpen={id=>setOpenPanel(id)}/>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:14,fontSize:12,color:C.muted,alignItems:"center"}}>
          <span style={{display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:3,border:`2px solid ${C.teal}`}}/> working / done</span>
          <span style={{display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:3,border:`2px solid ${C.danger}`}}/> flag → actuary</span>
          <span style={{display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:3,border:`2px solid ${C.orange}`}}/> human decision</span>

      {doc&&<DocViewer id={doc} onClose={()=>setDoc(null)}/>}

      {touring&&<Pointer {...ptr}/>}
      {touring&&<div style={{position:"fixed",left:0,right:0,bottom:0,zIndex:9200,display:"flex",justifyContent:"center",pointerEvents:"none"}}>
        <div style={{margin:"0 16px 18px",maxWidth:900,background:"rgba(31,30,29,.95)",color:"#fff",borderRadius:14,padding:"12px 16px",boxShadow:C.shadowLg,display:"flex",alignItems:"center",gap:14,pointerEvents:"auto"}}>
          <span style={{width:9,height:9,borderRadius:"50%",background:C.ok,flexShrink:0}}/>
          <span style={{flex:1,fontSize:13.5,lineHeight:1.45}}>{capt}</span>
          <button onClick={()=>setVoiceOn(v=>!v)} title="Mute" style={{background:"rgba(255,255,255,.14)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:999,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>{voiceOn?<Ic.Volume size={15}/>:<Ic.VolumeX size={15}/>}</button>
          <button onClick={()=>setTouring(false)} title="Exit tour" style={{background:"rgba(255,255,255,.14)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:999,padding:"0 12px",height:32,fontSize:12.5,cursor:"pointer",flexShrink:0,display:"inline-flex",alignItems:"center",gap:6}}><Ic.X size={13}/> Exit</button>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
